name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pnpm install --frozen-lockfile
      - run: python -m pip install -r agent-runtime/requirements.txt
      - run: pnpm build:ui
      - shell: pwsh
        run: |
          python -m PyInstaller --clean --noconfirm --onefile --name pc-use-agent-runtime agent-runtime/main.py
          New-Item -ItemType Directory -Force apps/desktop-host/src-tauri/bin | Out-Null
          Copy-Item dist/pc-use-agent-runtime.exe apps/desktop-host/src-tauri/bin/pc-use-agent-runtime-x86_64-pc-windows-msvc.exe
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/desktop-host
          tagName: ${{ github.ref_name }}
          releaseName: PC-Use Agent ${{ github.ref_name }}
          releaseBody: Windows local-mode MVP build.
          releaseDraft: true
          prerelease: true
          args: --target x86_64-pc-windows-msvc
