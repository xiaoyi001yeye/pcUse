name: Build Installers

on:
  workflow_dispatch:
  push:
    branches:
      - "**"
  pull_request:
    branches: [main]

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop-host/src-tauri

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Install runtime dependencies
        run: python -m pip install -r agent-runtime/requirements.txt

      - name: Build UI
        run: pnpm build:ui

      - name: Package Python runtime sidecar
        shell: pwsh
        run: |
          python -m PyInstaller --clean --noconfirm --onefile --name pc-use-agent-runtime agent-runtime/main.py
          New-Item -ItemType Directory -Force apps/desktop-host/src-tauri/bin | Out-Null
          Copy-Item dist/pc-use-agent-runtime.exe apps/desktop-host/src-tauri/bin/pc-use-agent-runtime-x86_64-pc-windows-msvc.exe

      - name: Build Tauri installer
        uses: tauri-apps/tauri-action@v0
        with:
          projectPath: apps/desktop-host
          args: --target x86_64-pc-windows-msvc --bundles nsis

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pc-use-agent-windows-artifacts
          path: |
            apps/desktop-host/src-tauri/target/release/bundle/**/*.exe
            apps/desktop-host/src-tauri/target/**/release/bundle/**/*.exe
          if-no-files-found: error

  build-macos:
    runs-on: macos-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop-host/src-tauri

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Install runtime dependencies
        run: python -m pip install -r agent-runtime/requirements.txt

      - name: Build UI
        run: pnpm build:ui

      - name: Package Python runtime sidecar
        shell: bash
        run: |
          python -m PyInstaller --clean --noconfirm --onefile --name pc-use-agent-runtime agent-runtime/main.py
          host_triple="$(rustc -Vv | awk '/host:/{print $2}')"
          mkdir -p apps/desktop-host/src-tauri/bin
          cp dist/pc-use-agent-runtime "apps/desktop-host/src-tauri/bin/pc-use-agent-runtime-${host_triple}"
          chmod +x "apps/desktop-host/src-tauri/bin/pc-use-agent-runtime-${host_triple}"

      - name: Build Tauri DMG
        uses: tauri-apps/tauri-action@v0
        with:
          projectPath: apps/desktop-host
          args: --bundles dmg

      - name: Upload DMG artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pc-use-agent-macos-artifacts
          path: |
            apps/desktop-host/src-tauri/target/release/bundle/**/*.dmg
            apps/desktop-host/src-tauri/target/**/release/bundle/**/*.dmg
          if-no-files-found: error
